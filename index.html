<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Poker Night</title>
<meta name="theme-color" content="#111827">
<style>
:root{
  --bg1:#091225; --bg2:#111827; --card:rgba(255,255,255,.08); --card2:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.12); --text:#f8fafc; --muted:#cbd5e1; --soft:#94a3b8;
  --accent:#22c55e; --accent2:#16a34a; --good:#4ade80; --bad:#fb7185; --warn:#fbbf24;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Arial,sans-serif;color:var(--text);
  background:
    radial-gradient(circle at top right, rgba(34,197,94,.18), transparent 24%),
    radial-gradient(circle at top left, rgba(59,130,246,.16), transparent 25%),
    linear-gradient(180deg,var(--bg1),var(--bg2) 45%,#0f172a 100%);
  min-height:100vh
}
.container{max-width:1100px;margin:0 auto;padding:10px 10px 64px}
.card{background:var(--card);border:1px solid var(--border);border-radius:22px}
.card-inner{padding:16px}
h1,h2,p{margin:0}
.hero{padding:16px;margin:8px 0 10px}
.hero-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.eyebrow{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.18);font-size:13px}
h1{font-size:24px;margin-top:8px}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap}
button{
  border:0;border-radius:14px;padding:12px 14px;cursor:pointer;color:#fff;
  background:linear-gradient(180deg,var(--accent),var(--accent2));font-size:14px;font-weight:700;min-height:44px
}
button.secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text)}
button.warning{background:rgba(251,191,36,.16);color:#fde68a;border:1px solid rgba(251,191,36,.24)}
button.danger{background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.24);color:#fecdd3;min-height:auto;padding:10px 12px}
.top-stats{
  position:sticky;top:6px;z-index:20;display:flex;gap:8px;flex-wrap:wrap;
  padding:10px;margin-bottom:10px;border-radius:16px;background:rgba(17,24,39,.92);
  border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px)
}
.top-stats .chip{padding:7px 9px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;color:var(--muted)}
.main-tabs,.tabs{display:flex;gap:6px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.main-tabs{margin:0 0 8px 0;padding-inline:2px}
.main-tabs button,.tabs button{font-size:11px;line-height:1.1;
  min-height:auto;padding:9px 11px;border-radius:999px;white-space:nowrap;flex:0 0 auto;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)
}
.main-tabs button.active,.tabs button.active{background:linear-gradient(180deg,var(--accent),var(--accent2))}
.main-section{display:none}
.main-section.active{display:block}
.layout{display:grid;grid-template-columns:1.45fr 1fr;gap:14px}
.stack{display:grid;gap:14px}
.card-title{font-size:18px;margin-bottom:10px}
.field{display:grid;gap:8px}
label{font-size:13px;color:var(--muted);font-weight:700}
input,select{
  width:100%;background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.14);
  border-radius:14px;padding:12px;font-size:16px;outline:none
}
select option{color:#111827}
.form-grid{display:grid;grid-template-columns:1fr 130px 130px 110px;gap:10px;align-items:end}
.preset-list,.quick-actions,.stats-grid,.issues,.summary-grid,.bit-grid{display:flex;flex-wrap:wrap;gap:8px}
.preset-list{display:grid;gap:8px}
.preset-row{
  display:grid;grid-template-columns:1fr 120px 40px;gap:8px;align-items:center;
  background:var(--card2);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:8px 10px
}
.preset-row input[type=checkbox]{width:22px;height:22px;accent-color:var(--accent)}
.player-card,.summary-card,.stat-box,.issue,.bit-box{
  background:var(--card2);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px
}
.player-head{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;align-items:center}
.player-name{font-size:22px;font-weight:800}
.meta-label{font-size:12px;color:var(--soft);margin-bottom:6px}
.amount{font-size:22px;font-weight:800}
.good{color:var(--good)} .bad{color:var(--bad)}
.player-body{display:grid;gap:12px;margin-top:14px}
.quick-actions button,.quick-actions select{min-height:auto;padding:10px 12px;border-radius:12px;width:auto}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);
  border-radius:999px;padding:7px 10px;font-size:12px;color:#e2e8f0
}
.summary-card{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px;align-items:center}
.bit-box{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.empty{padding:16px;border-radius:16px;border:1px dashed rgba(255,255,255,.16);color:var(--soft);background:rgba(255,255,255,.04)}
@media (max-width:980px){
  .layout,.form-grid,.player-head,.summary-card,.bit-box{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
  <section class="card hero">
    <div class="hero-top">
      <div>
        <div class="eyebrow">♠️ Poker Night</div>
        <h1>מחשבון פוקר</h1>
      </div>
      <div class="hero-actions">
        <button id="finishGameBtn" class="warning">סיים משחק</button>
        <button id="resetAllBtn" class="secondary">איפוס</button>
        <button id="saveNowBtn" class="secondary">שמור</button>
      </div>
    </div>
  </section>

  <div id="topStats" class="top-stats"></div>

  <div class="main-tabs">
    <button id="mainTabGame" class="active" onclick="switchMainTab('game')">משחק</button>
    <button id="mainTabPresets" onclick="switchMainTab('presets')">שחקנים</button>
    <button id="mainTabSummary" onclick="switchMainTab('summary')">סיכומים</button>
    <button id="mainTabBit" onclick="switchMainTab('bit')">העברות ביט</button>
  </div>

  <div id="mainSectionGame" class="main-section active">
    <div class="layout">
      <div class="stack">
        <section class="card">
          <div class="card-inner">
            <div class="card-title">משחק</div><div class="meta-label" style="margin-bottom:8px">הוספת שחקנים ואורחים נמצאת בלשונית "שחקנים"</div>
            <div class="field">
              <label for="gameName">שם המשחק</label>
              <input id="gameName" placeholder="שם המשחק">
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-inner">
            <div class="card-title">שחקנים</div>
            <div id="playerTabs" class="tabs"></div>
            <input id="playerSearch" placeholder="חיפוש שחקן..." style="margin:10px 0">
            <div id="playerView"></div>
          </div>
        </section>
      </div>

      <div class="stack">
        <section class="card">
          <div class="card-inner">
            <div class="card-title">פילוח הקופה</div>
            <div id="potBreakdown" class="stats-grid"></div>
          </div>
        </section>

        <section class="card">
          <div class="card-inner">
            <div class="card-title">בדיקות</div>
            <div id="issuesList" class="issues"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="mainSectionPresets" class="main-section">
    <section class="card">
      <div class="card-inner">
        <div class="card-title">שחקנים</div>
        <div class="field" style="margin-bottom:12px">
          <label>בחר שחקנים להוספה למשחק</label>
          <div id="presetPlayers" class="preset-list"></div>
        </div>
        <button id="addSelectedPlayersBtn">הוסף נבחרים למשחק</button>
      </div>
    </section>

    <section class="card" style="margin-top:14px">
      <div class="card-inner">
        <div class="card-title">שחקן אורח</div>
        <div class="form-grid">
          <div class="field">
            <label for="newPlayerName">שחקן חדש</label>
            <input id="newPlayerName" placeholder="שם שחקן">
          </div>
          <div class="field">
            <label for="defaultBuyIn">כניסה התחלתית</label>
            <input id="defaultBuyIn" type="number" value="50">
          </div>
          <div class="field">
            <label for="defaultBuyInMethod">אמצעי</label>
            <select id="defaultBuyInMethod">
              <option value="cash" selected>מזומן</option>
              <option value="bit">ביט</option>
            </select>
          </div>
          <button id="addPlayerBtn">הוסף</button>
        </div>
      </div>
    </section>
  </div>

  <div id="mainSectionSummary" class="main-section">
    <section class="card">
      <div class="card-inner">
        <div class="card-title">סיכום לפי שחקן</div>
        <div id="summaryList" class="summary-grid" style="display:grid"></div>
      </div>
    </section>
  </div>

  <div id="mainSectionBit" class="main-section">
    <section class="card" style="margin-bottom:14px">
      <div class="card-inner">
        <div class="card-title">סיכום העברות ביט</div>
        <div id="bitTransfers" class="bit-grid" style="display:grid"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-inner">
        <div class="card-title">כמה כל שחקן עוד צריך לקבל בביט</div>
        <div id="bitOutstanding" class="bit-grid" style="display:grid"></div>
      </div>
    </section>
  </div>
</div>

<script>
const STORAGE_KEY = "poker-tabs-main-v2";
const PRESET_PLAYERS = ["יגאל","ליאור","דניאל","ניר","ניסן","דין","זוהר","מני","אשר","רומן","איתי"];

const els = {
  topStats: document.getElementById("topStats"),
  gameName: document.getElementById("gameName"),
  newPlayerName: document.getElementById("newPlayerName"),
  defaultBuyIn: document.getElementById("defaultBuyIn"),
  defaultBuyInMethod: document.getElementById("defaultBuyInMethod"),
  addPlayerBtn: document.getElementById("addPlayerBtn"),
  addSelectedPlayersBtn: document.getElementById("addSelectedPlayersBtn"),
  saveNowBtn: document.getElementById("saveNowBtn"),
  resetAllBtn: document.getElementById("resetAllBtn"),
  finishGameBtn: document.getElementById("finishGameBtn"),
  presetPlayers: document.getElementById("presetPlayers"),
  playerTabs: document.getElementById("playerTabs"),
  playerSearch: document.getElementById("playerSearch"),
  playerView: document.getElementById("playerView"),
  potBreakdown: document.getElementById("potBreakdown"),
  issuesList: document.getElementById("issuesList"),
  summaryList: document.getElementById("summaryList"),
  bitTransfers: document.getElementById("bitTransfers"),
  bitOutstanding: document.getElementById("bitOutstanding"),
  mainTabGame: document.getElementById("mainTabGame"),
  mainTabPresets: document.getElementById("mainTabPresets"),
  mainTabSummary: document.getElementById("mainTabSummary"),
  mainTabBit: document.getElementById("mainTabBit"),
  mainSectionGame: document.getElementById("mainSectionGame"),
  mainSectionPresets: document.getElementById("mainSectionPresets"),
  mainSectionSummary: document.getElementById("mainSectionSummary"),
  mainSectionBit: document.getElementById("mainSectionBit")
};

const defaultState = {
  gameName: "פוקר עם חברים",
  defaultBuyIn: 50,
  defaultBuyInMethod: "cash",
  gameFinished: false,
  activePlayerId: null,
  mainTab: "game",
  players: []
};

let state = loadState();

function clone(x){ return JSON.parse(JSON.stringify(x)); }

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return clone(defaultState);
    const parsed = JSON.parse(raw);
    if(!parsed || !Array.isArray(parsed.players)) return clone(defaultState);
    return {
      gameName: parsed.gameName || defaultState.gameName,
      defaultBuyIn: Number(parsed.defaultBuyIn) || 50,
      defaultBuyInMethod: parsed.defaultBuyInMethod || "cash",
      gameFinished: !!parsed.gameFinished,
      activePlayerId: parsed.activePlayerId || null,
      mainTab: parsed.mainTab || "game",
      players: parsed.players.map((p) => ({
        id: p.id || crypto.randomUUID(),
        name: p.name || "שחקן",
        buyIns: Array.isArray(p.buyIns) ? p.buyIns.map((b) => ({ amount: Number(b.amount) || 0, method: b.method === "bit" ? "bit" : "cash" })) : [],
        cashOut: p.cashOut === "" ? "" : Number(p.cashOut) || 0,
        finalCash: Number(p.finalCash) || 0
      }))
    };
  } catch {
    return clone(defaultState);
  }
}

function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function formatCurrency(v){ return new Intl.NumberFormat("he-IL",{style:"currency",currency:"ILS",maximumFractionDigits:0}).format(Number.isFinite(v)?v:0); }
function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
function totalBuyIn(p){ return p.buyIns.reduce((s,b)=>s+b.amount,0); }
function totalByMethod(p,m){ return p.buyIns.filter((b)=>b.method===m).reduce((s,b)=>s+b.amount,0); }
function netResult(p){ return p.cashOut === "" ? null : (Number(p.cashOut)||0) - totalBuyIn(p); }
function remainingBit(p){ return p.cashOut === "" ? null : Math.max((Number(p.cashOut)||0) - (Number(p.finalCash)||0), 0); }
function playerExists(name){ return state.players.some((p)=>p.name===name); }

function validateGame(players){
  const totalIn = players.reduce((s,p)=>s+totalBuyIn(p),0);
  const totalOut = players.reduce((s,p)=>s+(p.cashOut===""?0:Number(p.cashOut)||0),0);
  const issues = [];
  if(players.length && players.some((p)=>p.cashOut==="")) issues.push("יש שחקנים בלי סכום סופי.");
  if(players.length && Math.abs(totalIn-totalOut) > 0.5) issues.push(`סה״כ הכניסות (${formatCurrency(totalIn)}) לא שווה לסה״כ הסכומים הסופיים (${formatCurrency(totalOut)}).`);
  if(players.some((p)=>p.cashOut !== "" && (Number(p.finalCash)||0) > (Number(p.cashOut)||0)+0.01)) issues.push("יש שחקנים שסכום המזומן שקיבלו גבוה מהסכום הסופי שלהם.");
  return issues;
}

function bitTransfersByPlayers(players){
  const creditors = players.map((p)=>({name:p.name,amount:remainingBit(p)||0})).filter((p)=>p.amount>0).sort((a,b)=>b.amount-a.amount);
  const debtors = players.map((p)=>({name:p.name,amount:netResult(p)!==null && netResult(p)<0 ? Math.abs(netResult(p)) : 0})).filter((p)=>p.amount>0).sort((a,b)=>b.amount-a.amount);
  const out = [];
  let i=0,j=0;
  while(i<debtors.length && j<creditors.length){
    const amount = Math.min(debtors[i].amount, creditors[j].amount);
    if(amount>0) out.push({from:debtors[i].name,to:creditors[j].name,amount});
    debtors[i].amount -= amount;
    creditors[j].amount -= amount;
    if(debtors[i].amount < 0.01) i++;
    if(creditors[j].amount < 0.01) j++;
  }
  return out;
}

function buildPresetPlayers(){
  els.presetPlayers.innerHTML = PRESET_PLAYERS.map((name)=>`
    <div class="preset-row">
      <div>${name}</div>
      <select id="preset-method-${name}">
        <option value="cash" selected>מזומן</option>
        <option value="bit">ביט</option>
      </select>
      <input type="checkbox" value="${name}">
    </div>
  `).join("");
}

function addPlayerWithName(name, methodOverride=null){
  const buyIn = Number(els.defaultBuyIn.value)||0;
  const method = methodOverride ? methodOverride : (els.defaultBuyInMethod.value==="bit"?"bit":"cash");
  if(!name || playerExists(name)) return;
  const id = crypto.randomUUID();
  state.players.push({ id, name, buyIns: buyIn>0 ? [{amount:buyIn,method}] : [], cashOut:"", finalCash:0 });
  state.activePlayerId = id;
}

function switchMainTab(tab){
  state.mainTab = tab;
  els.mainTabGame.classList.toggle("active", tab==="game");
  els.mainTabPresets.classList.toggle("active", tab==="presets");
  els.mainTabSummary.classList.toggle("active", tab==="summary");
  els.mainTabBit.classList.toggle("active", tab==="bit");
  els.mainSectionGame.classList.toggle("active", tab==="game");
  els.mainSectionPresets.classList.toggle("active", tab==="presets");
  els.mainSectionSummary.classList.toggle("active", tab==="summary");
  els.mainSectionBit.classList.toggle("active", tab==="bit");
  saveState();
}

function renderTabs(filtered){
  if(filtered.length && !filtered.some((p)=>p.id===state.activePlayerId)) state.activePlayerId = filtered[0].id;
  els.playerTabs.innerHTML = filtered.map((p)=>`<button class="${state.activePlayerId===p.id?'active':''}" onclick="openPlayer('${p.id}')">${escapeHtml(p.name)}</button>`).join("");
}

function renderTopStats(){
  const potCash = state.players.reduce((s,p)=>s+totalByMethod(p,"cash"),0);
  const potBit = state.players.reduce((s,p)=>s+totalByMethod(p,"bit"),0);
  const totalIn = state.players.reduce((s,p)=>s+totalBuyIn(p),0);
  const totalOut = state.players.reduce((s,p)=>s+(p.cashOut===""?0:Number(p.cashOut)||0),0);

  els.topStats.innerHTML = `
    <div class="chip">👥 ${state.players.length} שחקנים</div>
    <div class="chip">💰 קופה ${formatCurrency(totalIn)}</div>
    <div class="chip">💵 מזומן ${formatCurrency(potCash)}</div>
    <div class="chip">📲 ביט ${formatCurrency(potBit)}</div>
    <div class="chip">🏁 סופי ${formatCurrency(totalOut)}</div>
    <div class="chip">${state.gameFinished ? "🔒 הסתיים" : "🟢 פתוח"}</div>
  `;

  els.potBreakdown.innerHTML = `
    <div class="stat-box"><div class="meta-label">מזומן בקופה</div><div class="amount">${formatCurrency(potCash)}</div></div>
    <div class="stat-box"><div class="meta-label">ביט בקופה</div><div class="amount">${formatCurrency(potBit)}</div></div>
    <div class="stat-box"><div class="meta-label">סה״כ קופה</div><div class="amount">${formatCurrency(potCash+potBit)}</div></div>
  `;
}

function renderPlayerView(filtered){
  const player = filtered.find((p)=>p.id===state.activePlayerId);
  if(!player){ els.playerView.innerHTML = `<div class="empty">אין שחקן תואם</div>`; return; }
  const invested = totalBuyIn(player);
  const cashOut = player.cashOut === "" ? "" : Number(player.cashOut)||0;
  const net = netResult(player);
  const finalCash = Number(player.finalCash)||0;
  const needBit = remainingBit(player);

  els.playerView.innerHTML = `
    <div class="player-card">
      <div class="player-head">
        <div>
          <div class="player-name">${escapeHtml(player.name)}</div>
          <div class="meta-label">${player.buyIns.length} כניסות</div>
        </div>
        <div>
          <div class="meta-label">השקיע</div>
          <div class="amount">${formatCurrency(invested)}</div>
        </div>
        <div>
          <div class="meta-label">רווח / הפסד</div>
          <div class="amount ${(net===null||net>=0)?'good':'bad'}">${net===null?'-':`${net>=0?'+':'-'}${formatCurrency(Math.abs(net))}`}</div>
        </div>
      </div>

      <div class="player-body">
        <div class="chips">
          ${player.buyIns.length
            ? player.buyIns.map((b,i)=>`<span class="chip">כניסה ${i+1}: ${formatCurrency(b.amount)} • ${b.method==="bit"?"ביט":"מזומן"}</span>`).join("")
            : `<span class="chip">ללא כניסות</span>`}
        </div>

        <div class="quick-actions">
          <select id="method-${player.id}" ${state.gameFinished?"disabled":""}>
            <option value="cash">מזומן</option>
            <option value="bit">ביט</option>
          </select>
          <button class="secondary" onclick="addBuyIn('${player.id}',50)" ${state.gameFinished?"disabled":""}>50</button>
          <button class="secondary" onclick="addBuyIn('${player.id}',100)" ${state.gameFinished?"disabled":""}>100</button>
          <button class="secondary" onclick="addBuyIn('${player.id}',200)" ${state.gameFinished?"disabled":""}>200</button>
          <button class="secondary" onclick="addCustomBuyIn('${player.id}')" ${state.gameFinished?"disabled":""}>אחר</button>
          <button class="danger" onclick="removePlayer('${player.id}')" ${state.gameFinished?"disabled":""}>מחק</button>
        </div>

        <div class="chips">
          <span class="chip">ביט: ${formatCurrency(totalByMethod(player,"bit"))}</span>
          <span class="chip">מזומן: ${formatCurrency(totalByMethod(player,"cash"))}</span>
          ${player.cashOut==="" ? "" : `<span class="chip">נשאר לקבל ביט: ${formatCurrency(needBit)}</span>`}
        </div>

        <div class="form-grid">
          <div class="field">
            <label>סכום סופי</label>
            <input type="number" value="${cashOut===""?"":cashOut}" placeholder="0" ${state.gameFinished?"disabled":""}
              onchange="updateCashOut('${player.id}', this.value)" onblur="updateCashOut('${player.id}', this.value)">
          </div>
          <div class="field">
            <label>מזומן שקיבל בסוף</label>
            <input type="number" value="${finalCash}" placeholder="0" ${state.gameFinished?"disabled":""}
              onchange="updateFinalCash('${player.id}', this.value)" onblur="updateFinalCash('${player.id}', this.value)">
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderIssues(){
  const issues = validateGame(state.players);
  els.issuesList.innerHTML = issues.length ? issues.map((x)=>`<div class="issue">${x}</div>`).join("") : `<div class="empty">אין בעיות מזוהות</div>`;
}

function renderSummary(){
  els.summaryList.innerHTML = state.players.length
    ? state.players.map((p)=>{
      const invested = totalBuyIn(p), cashOut = p.cashOut===""?0:Number(p.cashOut)||0, net = netResult(p), cash = Number(p.finalCash)||0, bit = remainingBit(p);
      return `
        <div class="summary-card">
          <div><div style="font-weight:800">${escapeHtml(p.name)}</div></div>
          <div><div class="meta-label">השקיע</div><div>${formatCurrency(invested)}</div><div class="meta-label">ביט ${formatCurrency(totalByMethod(p,"bit"))} • מזומן ${formatCurrency(totalByMethod(p,"cash"))}</div></div>
          <div><div class="meta-label">סכום סופי</div><div>${p.cashOut===""?"-":formatCurrency(cashOut)}</div></div>
          <div><div class="meta-label">רווח / הפסד</div><div class="${net===null||net>=0?'good':'bad'}" style="font-weight:800">${net===null?'-':`${net>=0?'+':'-'}${formatCurrency(Math.abs(net))}`}</div></div>
          <div><div class="meta-label">מזומן שקיבל / נשאר לקבל ביט</div><div>${p.cashOut===""?"-":`${formatCurrency(cash)} / ${formatCurrency(bit)}`}</div></div>
        </div>
      `;
    }).join("")
    : `<div class="empty">אין עדיין שחקנים</div>`;
}

function renderBit(){
  const transfers = bitTransfersByPlayers(state.players);
  els.bitTransfers.innerHTML = transfers.length
    ? transfers.map((t)=>`
      <div class="bit-box">
        <div><div style="font-weight:800">${escapeHtml(t.from)}</div><div class="meta-label">צריך להעביר ביט ל-${escapeHtml(t.to)}</div></div>
        <div class="amount">${formatCurrency(t.amount)}</div>
      </div>
    `).join("")
    : `<div class="empty">אין עדיין העברות ביט</div>`;

  const winners = state.players.filter((p)=>p.cashOut!=="" && remainingBit(p) > 0);
  els.bitOutstanding.innerHTML = winners.length
    ? winners.map((p)=>`
      <div class="bit-box">
        <div><div style="font-weight:800">${escapeHtml(p.name)}</div><div class="meta-label">מזומן שקיבל: ${formatCurrency(Number(p.finalCash)||0)}</div></div>
        <div class="amount">${formatCurrency(remainingBit(p))}</div>
      </div>
    `).join("")
    : `<div class="empty">אין יתרות ביט כרגע</div>`;
}

function render(){
  els.gameName.value = state.gameName;
  els.defaultBuyIn.value = state.defaultBuyIn;
  els.defaultBuyInMethod.value = state.defaultBuyInMethod;

  const search = (els.playerSearch.value || "").toLowerCase();
  const filtered = state.players.filter((p)=>p.name.toLowerCase().includes(search));

  renderTopStats();
  renderTabs(filtered);
  renderPlayerView(filtered);
  renderIssues();
  renderSummary();
  renderBit();
  switchMainTab(state.mainTab);
  saveState();
}

function addPlayer(){
  if(state.gameFinished) return;
  const name = els.newPlayerName.value.trim();
  if(!name) return;
  addPlayerWithName(name);
  els.newPlayerName.value = "";
  render();
}
function addSelectedPlayers(){
  if(state.gameFinished) return;
  const checked = Array.from(els.presetPlayers.querySelectorAll('input[type="checkbox"]:checked'));
  checked.forEach((el)=>{
    const name = el.value;
    const methodEl = document.getElementById(`preset-method-${name}`);
    const method = methodEl && methodEl.value === "bit" ? "bit" : "cash";
    addPlayerWithName(name, method);
    el.checked = false;
  });
  state.mainTab = "game";
  render();
}
function removePlayer(id){
  if(state.gameFinished) return;
  state.players = state.players.filter((p)=>p.id!==id);
  if(state.activePlayerId === id) state.activePlayerId = state.players[0]?.id || null;
  render();
}
function addBuyIn(id, amount){
  if(state.gameFinished) return;
  const methodEl = document.getElementById(`method-${id}`);
  const method = methodEl && methodEl.value === "bit" ? "bit" : "cash";
  state.players = state.players.map((p)=>p.id===id ? {...p, buyIns:[...p.buyIns,{amount,method}]} : p);
  state.activePlayerId = id;
  render();
}
function addCustomBuyIn(id){
  if(state.gameFinished) return;
  const value = prompt("הכנס סכום:");
  const amount = Number(value);
  if(!Number.isFinite(amount) || amount<=0) return;
  addBuyIn(id, amount);
}
function updateCashOut(id, value){
  if(state.gameFinished) return;
  state.players = state.players.map((p)=>p.id===id ? {...p, cashOut:value===""?"":Number(value)||0} : p);
  state.activePlayerId = id;
  render();
}
function updateFinalCash(id, value){
  if(state.gameFinished) return;
  state.players = state.players.map((p)=>p.id===id ? {...p, finalCash:Number(value)||0} : p);
  state.activePlayerId = id;
  render();
}
function openPlayer(id){
  state.activePlayerId = id;
  render();
  const section = document.getElementById("playerView");
  if(section) section.scrollIntoView({behavior:"smooth", block:"start"});
}
function finishGame(){
  const issues = validateGame(state.players);
  if(issues.length){ alert("אי אפשר לסיים משחק לפני תיקון הנתונים."); return; }
  state.gameFinished = true;
  render();
}
function resetAll(){
  if(!confirm("לאפס את כל המשחק?")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = clone(defaultState);
  render();
}

buildPresetPlayers();

els.addPlayerBtn.addEventListener("click", addPlayer);
els.addSelectedPlayersBtn.addEventListener("click", addSelectedPlayers);
els.saveNowBtn.addEventListener("click", () => {
  saveState();
  const old = els.saveNowBtn.textContent;
  els.saveNowBtn.textContent = "נשמר";
  setTimeout(()=>els.saveNowBtn.textContent=old,1200);
});
els.resetAllBtn.addEventListener("click", resetAll);
els.finishGameBtn.addEventListener("click", finishGame);
els.newPlayerName.addEventListener("keydown", (e)=>{ if(e.key==="Enter") addPlayer(); });
els.playerSearch.addEventListener("input", render);
els.gameName.addEventListener("change", (e)=>{ state.gameName = e.target.value; render(); });
els.gameName.addEventListener("blur", (e)=>{ state.gameName = e.target.value; render(); });
els.defaultBuyIn.addEventListener("input", (e)=>{ state.defaultBuyIn = Number(e.target.value)||0; saveState(); });
els.defaultBuyInMethod.addEventListener("change", (e)=>{ state.defaultBuyInMethod = e.target.value==="bit"?"bit":"cash"; saveState(); });

render();

window.addBuyIn = addBuyIn;
window.addCustomBuyIn = addCustomBuyIn;
window.updateCashOut = updateCashOut;
window.updateFinalCash = updateFinalCash;
window.openPlayer = openPlayer;
window.removePlayer = removePlayer;
window.switchMainTab = switchMainTab;
</script>
</body>
</html>
